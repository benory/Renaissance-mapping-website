<script>

const timelineSliderState = {
    activeThumb: null,
    initialized: false
};

function clampTimelineYear(year) {
    return Math.max(HISTOGRAM_START_YEAR, Math.min(TIMELINE_END_YEAR, year));
}

function getTimelineSliderPercent(year) {
    return (year - HISTOGRAM_START_YEAR) / (TIMELINE_END_YEAR - HISTOGRAM_START_YEAR);
}

function getVisibleTimelineRange() {
    return {
        min: clampTimelineYear(currentDateRange[0]),
        max: clampTimelineYear(currentDateRange[1])
    };
}

function positionTimelineLabel(label, percent, sliderWidth) {
    const rawLeft = percent * sliderWidth;
    const halfLabelWidth = label.offsetWidth / 2;
    const clampedLeft = Math.max(halfLabelWidth, Math.min(sliderWidth - halfLabelWidth, rawLeft));
    label.style.left = `${clampedLeft}px`;
}

function renderTimelineSlider(minValue, maxValue) {
    const slider = document.getElementById('timeline-slider');
    const selectedTrack = document.getElementById('timeline-slider-selected-range');
    const minThumb = document.getElementById('timeline-slider-thumb-min');
    const maxThumb = document.getElementById('timeline-slider-thumb-max');
    const startActiveLabel = document.getElementById('slider-start-active-label');
    const endActiveLabel = document.getElementById('slider-end-active-label');

    if (!slider || !selectedTrack || !minThumb || !maxThumb || !startActiveLabel || !endActiveLabel) return;

    startActiveLabel.innerHTML = formatTimelineBoundaryLabel(minValue);
    endActiveLabel.textContent = String(maxValue);

    const minPercent = getTimelineSliderPercent(minValue);
    const maxPercent = getTimelineSliderPercent(maxValue);
    const sliderWidth = slider.clientWidth;

    minThumb.style.left = `${minPercent * 100}%`;
    maxThumb.style.left = `${maxPercent * 100}%`;
    minThumb.setAttribute("aria-valuemin", HISTOGRAM_START_YEAR);
    minThumb.setAttribute("aria-valuemax", TIMELINE_END_YEAR);
    minThumb.setAttribute("aria-valuenow", minValue);
    maxThumb.setAttribute("aria-valuemin", HISTOGRAM_START_YEAR);
    maxThumb.setAttribute("aria-valuemax", TIMELINE_END_YEAR);
    maxThumb.setAttribute("aria-valuenow", maxValue);

    selectedTrack.style.left = `${minPercent * 100}%`;
    selectedTrack.style.width = `${Math.max(0, (maxPercent - minPercent) * 100)}%`;

    positionTimelineLabel(startActiveLabel, minPercent, sliderWidth);
    positionTimelineLabel(endActiveLabel, maxPercent, sliderWidth);
}

function applyTimelineRange(minValue, maxValue, { applyFilters = true } = {}) {
    const nextMin = clampTimelineYear(Math.min(minValue, maxValue));
    const nextMax = clampTimelineYear(Math.max(minValue, maxValue));

    currentDateRange[0] = nextMin <= HISTOGRAM_START_YEAR ? availableDateRange.min : nextMin;
    currentDateRange[1] = nextMax;

    renderTimelineSlider(nextMin, nextMax);

    if (applyFilters) {
        filterAndSearchMarkers();
    }
}

function updateDateRange() {
    const { min, max } = getVisibleTimelineRange();
    applyTimelineRange(min, max);
}

function syncTimelineSliderToCurrentDateRange() {
    const { min, max } = getVisibleTimelineRange();
    renderTimelineSlider(min, max);
}

function updateSliderBackground() {
    syncTimelineSliderToCurrentDateRange();
}

function getTimelineYearFromPointer(clientX) {
    const slider = document.getElementById("timeline-slider");
    if (!slider) return HISTOGRAM_START_YEAR;

    const rect = slider.getBoundingClientRect();
    const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return clampTimelineYear(Math.round(HISTOGRAM_START_YEAR + percent * (TIMELINE_END_YEAR - HISTOGRAM_START_YEAR)));
}

function handleTimelineThumbKeydown(event) {
    const { min, max } = getVisibleTimelineRange();
    const step = event.shiftKey ? 10 : 1;
    let nextMin = min;
    let nextMax = max;

    if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
        if (event.currentTarget.id === "timeline-slider-thumb-min") nextMin = min - step;
        else nextMax = max - step;
    } else if (event.key === "ArrowRight" || event.key === "ArrowUp") {
        if (event.currentTarget.id === "timeline-slider-thumb-min") nextMin = min + step;
        else nextMax = max + step;
    } else {
        return;
    }

    event.preventDefault();

    if (event.currentTarget.id === "timeline-slider-thumb-min") {
        applyTimelineRange(Math.min(nextMin, max), max);
    } else {
        applyTimelineRange(min, Math.max(nextMax, min));
    }
}

function handleTimelinePointerMove(event) {
    if (!timelineSliderState.activeThumb) return;

    const draggedYear = getTimelineYearFromPointer(event.clientX);
    const { min, max } = getVisibleTimelineRange();

    if (timelineSliderState.activeThumb === "min") {
        applyTimelineRange(Math.min(draggedYear, max), max);
    } else {
        applyTimelineRange(min, Math.max(draggedYear, min));
    }
}

function stopTimelineDrag() {
    timelineSliderState.activeThumb = null;
    document.body.classList.remove("timeline-slider-dragging");
}

function initTimelineSlider() {
    if (timelineSliderState.initialized) return;

    const slider = document.getElementById("timeline-slider");
    const minThumb = document.getElementById("timeline-slider-thumb-min");
    const maxThumb = document.getElementById("timeline-slider-thumb-max");

    if (!slider || !minThumb || !maxThumb) return;

    const startDrag = (thumb) => (event) => {
        event.preventDefault();
        timelineSliderState.activeThumb = thumb;
        document.body.classList.add("timeline-slider-dragging");
    };

    minThumb.addEventListener("pointerdown", startDrag("min"));
    maxThumb.addEventListener("pointerdown", startDrag("max"));
    minThumb.addEventListener("keydown", handleTimelineThumbKeydown);
    maxThumb.addEventListener("keydown", handleTimelineThumbKeydown);

    slider.addEventListener("pointerdown", (event) => {
        if (event.target === minThumb || event.target === maxThumb) return;

        const clickedYear = getTimelineYearFromPointer(event.clientX);
        const { min, max } = getVisibleTimelineRange();
        const moveMin = Math.abs(clickedYear - min) <= Math.abs(clickedYear - max);

        if (moveMin) {
            applyTimelineRange(Math.min(clickedYear, max), max);
        } else {
            applyTimelineRange(min, Math.max(clickedYear, min));
        }
    });

    window.addEventListener("pointermove", handleTimelinePointerMove);
    window.addEventListener("pointerup", stopTimelineDrag);
    window.addEventListener("resize", syncTimelineSliderToCurrentDateRange);

    timelineSliderState.initialized = true;
}

</script>
