<script>

const selectedNames = new Set(); // Track selected names globally

function getLocationSearchRank(entry, normalizedQuery) {
    const normalizedName = normalizeName(entry.locationname || "");
    const normalizedLabel = normalizeName(entry.locationlabel || "");
    const normalizedParent = normalizeName(entry.locationparent || "");

    if (normalizedName === normalizedQuery) return 0;
    if (normalizedLabel === normalizedQuery) return 1;
    if (normalizedParent === normalizedQuery) return 2;
    if (normalizedName.startsWith(normalizedQuery)) return 3;
    if (normalizedLabel.startsWith(normalizedQuery)) return 4;
    return 5;
}

function markerMatchesSelectedLocation(entry) {
    if (!selectedLocation) return true;

    const selectedNormalized = selectedLocation.normalizedKey || normalizeName(selectedLocation.locationlabel || "");
    const entryParent = normalizeName(entry.locationparent || "");
    const entryName = normalizeName(entry.locationname || "");

    return entry.locationid === selectedLocation.locationid ||
        entryParent === selectedNormalized ||
        entryName === selectedNormalized;
}

function markerMatchesLocationEntry(markerEntry, locationEntry) {
    const selectedNormalized = normalizeName(
        locationEntry.locationname || locationEntry.locationlabel || locationEntry.locationprocessed || ""
    );

    return markerEntry.locationid === locationEntry.locationid ||
        normalizeName(markerEntry.locationparent || "") === selectedNormalized ||
        normalizeName(markerEntry.locationname || "") === selectedNormalized;
}

function getLocationMatchesByName(name) {
    if (!name) return [];

    const normalizedTarget = normalizeName(name);
    const matches = new Map();

    markers.forEach(entry => {
        const rawNames = [
            entry.locationname,
            entry.locationlabel,
            entry.locationparent,
            entry.locationprocessed
        ].filter(value => typeof value === "string" && value.trim() !== "");

        const matched = rawNames.some(value => normalizeName(value) === normalizedTarget);
        if (!matched || matches.has(entry.locationid)) return;

        matches.set(entry.locationid, {
            locationid: entry.locationid,
            locationname: entry.locationname,
            locationlabel: entry.locationlabel,
            locationparent: entry.locationparent,
            locationprocessed: entry.locationprocessed
        });
    });

    return Array.from(matches.values()).sort((a, b) => {
        const rankDiff = getLocationSearchRank(a, normalizedTarget) - getLocationSearchRank(b, normalizedTarget);
        if (rankDiff !== 0) return rankDiff;
        return (a.locationlabel || a.locationprocessed || "").localeCompare(b.locationlabel || b.locationprocessed || "");
    });
}

function getActiveLocationIds() {
    const container = document.getElementById("location-active");
    if (!container) return [];

    return [...container.querySelectorAll(".selected-location-item")]
        .map(item => item.dataset.locationId)
        .filter(Boolean);
}

function removeSelectedLocation() {
    const activeContainer = document.getElementById("location-active");
    if (activeContainer) {
        activeContainer.innerHTML = "";
    }

    selectedLocation = null;
    filterAndSearchMarkers();

    if (selectedNames.size > 0) {
        zoomToSelectedPersons();
    }
}

function zoomToSelectedLocation() {
    const matchingMarkers = markers.filter(entry => markerMatchesSelectedLocation(entry));
    if (matchingMarkers.length === 0) return;

    const group = L.featureGroup(matchingMarkers.map(entry => entry.marker));
    const bounds = group.getBounds();

    if (!bounds.isValid()) return;

    map.fitBounds(bounds, {
        paddingTopLeft: [320, 50],
        paddingBottomRight: [50, 50],
        maxZoom: 12
    });
}

function zoomToSelectedPersons() {
    if (selectedLocation) return;

    const selectedPeople = new Set(selectedNames);
    const matchingMarkers = markers.filter(entry => selectedPeople.has(entry.personprocessed));
    if (matchingMarkers.length === 0) return;

    const group = L.featureGroup(matchingMarkers.map(entry => entry.marker));
    const bounds = group.getBounds();

    if (!bounds.isValid()) return;

    map.fitBounds(bounds, {
        padding: [50, 50],
        maxZoom: 6
    });
}

function addSelectedLocation(locationid, locationlabel, locationKey = locationlabel) {
    if (!locationid || !locationlabel) return;

    const activeContainer = document.getElementById("location-active");
    if (!activeContainer) return;

    activeContainer.innerHTML = "";
    selectedLocation = {
        locationid,
        locationlabel,
        normalizedKey: normalizeName(locationKey || locationlabel)
    };

    const selectedItem = document.createElement("div");
    selectedItem.className = "selected-person-item selected-location-item";
    selectedItem.dataset.locationId = locationid;

    const removeButton = document.createElement("span");
    removeButton.className = "remove-btn";
    removeButton.textContent = "×";
    removeButton.onclick = () => {
        removeSelectedLocation();
    };

    selectedItem.appendChild(removeButton);
    selectedItem.appendChild(document.createTextNode(`Location: ${locationlabel}`));
    activeContainer.appendChild(selectedItem);

    filterAndSearchMarkers();
    zoomToSelectedLocation();
}

function addSelectedPerson(personID, personprocessed) {
    const activeId = personID.startsWith('BCO')
        ? 'composer-active'
        : personID.startsWith('BMU')
        ? 'musician-active'
        : 'non-musician-active';

    const dropdownId = personID.startsWith('BCO')
        ? 'composer-list'
        : personID.startsWith('BMU')
        ? 'musician-list'
        : 'non-musician-list';

    const activeContainer = document.getElementById(activeId);

    // Avoid duplicate active entries
    if (!selectedNames.has(personprocessed)) {
        selectedNames.add(personprocessed);

        // Create a container for the active name
        const selectedItem = document.createElement('div');
        selectedItem.className = 'selected-person-item';

        // Set background color (with opacity 0.3) based on person type
        let bgColor = 'rgba(0, 0, 0, 0.3)'; // fallback

        if (personID.startsWith('BCO')) {
            bgColor = 'rgba(68, 1, 84, 0.3)';      // purple
        } else if (personID.startsWith('BMU')) {
            bgColor = 'rgba(35, 237, 92, 0.3)';    // green
        } else if (personID.startsWith('BNO')) {
            bgColor = 'rgba(253, 231, 37, 0.3)';   // yellow
        }

        selectedItem.style.backgroundColor = bgColor;
        selectedItem.style.color = 'black'; // Full opacity text

        // Create the "x" button
        const removeButton = document.createElement('span');
        removeButton.className = 'remove-btn';
        removeButton.textContent = '×';
        removeButton.onclick = () => {
            removeSelectedPerson(personID, personprocessed, dropdownId);
            filterAndSearchMarkers(); // Reapply filters after removal
        };

        selectedItem.appendChild(removeButton);
        selectedItem.appendChild(document.createTextNode(personprocessed));

        activeContainer.appendChild(selectedItem);

        recolorActivePersons();
        applyHighlightColorsToMarkers();

        filterAndSearchMarkers(); // Reapply filters after adding
        zoomToSelectedPersons();
    }
}

function selectPersonByName(name) {
    if (!name) return false;

    const normalizedTarget = name.trim().toLowerCase();
    const match = markers.find(({ personprocessed, alias }) => {
        if (typeof personprocessed === "string" &&
            personprocessed.trim().toLowerCase() === normalizedTarget) {
            return true;
        }

        if (typeof alias === "string") {
            return alias
                .split(";")
                .map(a => a.trim().toLowerCase())
                .includes(normalizedTarget);
        }

        if (Array.isArray(alias)) {
            return alias
                .filter(a => typeof a === "string")
                .map(a => a.trim().toLowerCase())
                .includes(normalizedTarget);
        }

        return false;
    });

    if (!match) {
        console.warn(`No person found for selection: ${name}`);
        return false;
    }

    addSelectedPerson(match.personID, match.personprocessed);

    if (match.personID.startsWith("BCO")) {
        document.getElementById("composer-select").checked = true;
    } else if (match.personID.startsWith("BMU")) {
        document.getElementById("musician-select").checked = true;
    } else if (match.personID.startsWith("BNO")) {
        document.getElementById("non-musician-select").checked = true;
    }

    filterAndSearchMarkers();
    return true;
}

function selectLocationByName(name) {
    const matches = getLocationMatchesByName(name);
    if (matches.length === 0) {
        console.warn(`No location found for selection: ${name}`);
        return false;
    }

    addSelectedLocation(
        matches[0].locationid,
        matches[0].locationlabel || matches[0].locationprocessed,
        matches[0].locationname || matches[0].locationlabel || matches[0].locationprocessed
    );
    return true;
}

function selectSearchTarget(name) {
    return selectPersonByName(name) || selectLocationByName(name);
}

function showAutocompleteSuggestions() {
    const inputValue = document.getElementById("input").value.trim().toLowerCase();
    const resultsContainer = document.getElementById("autocomplete-results");
    resultsContainer.innerHTML = "";

    if (!inputValue) {
        resultsContainer.style.display = "none";
        return;
    }

    const matches = [];
    const seen = new Set();

    markers.forEach(({ personID, personprocessed, alias }) => {
        if (selectedNames.has(personprocessed)) return;
        if (seen.has(personprocessed)) return;

        // Safely handle aliases from semicolon-separated string
        let aliasList = [];
        if (typeof alias === "string") {
            aliasList = alias.split(";").map(a => a.trim().toLowerCase());
        } else if (Array.isArray(alias)) {
            aliasList = alias
              .filter(a => typeof a === "string")
              .map(a => a.trim().toLowerCase());
        }
        const allNames = [personprocessed.toLowerCase(), ...aliasList];

        // Check if any name matches the search input
        const matched = allNames.some(name => name.includes(inputValue));
        if (!matched) return;

        seen.add(personprocessed);

        let type = "Unknown";
        if (personID.startsWith("BCO")) type = "Composer";
        else if (personID.startsWith("BMU")) type = "Musician";
        else if (personID.startsWith("BNO")) type = "Non-Musician";

        const personMarkers = markers.filter(m => m.personprocessed === personprocessed);
        const eventCount = personMarkers.length;

        let earliest = null;
        let latest = null;

        personMarkers.forEach(({ earliestyear, latestyear }) => {
            if (earliest === null || earliestyear < earliest) earliest = earliestyear;
            if (latest === null || latestyear > latest) latest = latestyear;
        });

        let formattedRange = earliest === latest
            ? `${earliest}`
            : (Math.floor(earliest / 100) === Math.floor(latest / 100)
                ? `${earliest}–${String(latest).slice(-2)}`
                : `${earliest}–${latest}`);

        const yearLabel = ` (${eventCount} event${eventCount > 1 ? "s" : ""}, ${formattedRange})`;
        const label = `${type}: ${personprocessed}${yearLabel}`;

        matches.push({ label, personID, personprocessed });
    });

    const seenLocations = new Set();

    const normalizedQuery = normalizeName(inputValue);

    markers.forEach(({ locationid, locationname, locationlabel, locationparent, locationprocessed }) => {
        if (!locationid || !locationprocessed) return;
        if (selectedLocation && selectedLocation.locationid === locationid) return;
        if (seenLocations.has(locationid)) return;

        const locationNames = [locationname, locationlabel, locationparent, locationprocessed]
            .filter(value => typeof value === "string")
            .map(value => value.toLowerCase());

        const matched = locationNames.some(name => name.includes(inputValue));
        if (!matched) return;

        seenLocations.add(locationid);

        const locationEntry = { locationid, locationname, locationlabel: locationlabel || locationprocessed, locationprocessed };
        const locationMarkers = markers.filter(m => markerMatchesLocationEntry(m, locationEntry));
        const eventCount = locationMarkers.length;
        const yearValues = locationMarkers.flatMap(({ earliestyear, latestyear }) => [earliestyear, latestyear]);
        const earliest = Math.min(...yearValues);
        const latest = Math.max(...yearValues);

        const formattedRange = earliest === latest
            ? `${earliest}`
            : (Math.floor(earliest / 100) === Math.floor(latest / 100)
                ? `${earliest}–${String(latest).slice(-2)}`
                : `${earliest}–${latest}`);

        const yearLabel = ` (${eventCount} event${eventCount > 1 ? "s" : ""}, ${formattedRange})`;
        const displayName = locationlabel || locationprocessed;
        const label = `Location: ${displayName}${yearLabel}`;

        matches.push({
            label,
            locationid,
            locationname,
            locationlabel: displayName,
            locationparent,
            locationRank: getLocationSearchRank(
                { locationname, locationlabel: displayName, locationparent },
                normalizedQuery
            ),
            resultType: "location"
        });
    });

    if (matches.length === 0) {
        resultsContainer.style.display = "none";
        return;
    }

    resultsContainer.style.display = "block";

    matches
        .sort((a, b) => {
            if ((a.resultType === "location") && (b.resultType === "location")) {
                if (a.locationRank !== b.locationRank) {
                    return a.locationRank - b.locationRank;
                }
            }
            return a.label.localeCompare(b.label);
        })
        .slice(0, 10)
        .forEach(({ label, personID, personprocessed, locationid, locationname, locationlabel, resultType }) => {
        const item = document.createElement("div");
        item.className = "autocomplete-item";
        item.textContent = label;

        item.onclick = () => {
            if (resultType === "location") {
                addSelectedLocation(locationid, locationlabel, locationname || locationlabel);
            } else {
                addSelectedPerson(personID, personprocessed);

                // Auto-check the corresponding checkbox if not already checked
                if (personID.startsWith("BCO")) {
                    document.getElementById("composer-select").checked = true;
                } else if (personID.startsWith("BMU")) {
                    document.getElementById("musician-select").checked = true;
                } else if (personID.startsWith("BNO")) {
                    document.getElementById("non-musician-select").checked = true;
                }
            }

            resultsContainer.innerHTML = "";
            resultsContainer.style.display = "none";

            const input = document.getElementById("input");
            input.value = "";
            input.blur();

            filterAndSearchMarkers();
        };

        resultsContainer.appendChild(item);
    });
}

function removeSelectedPerson(personID, personprocessed, dropdownId) {
    const activeId = personID.startsWith('BCO')
        ? 'composer-active'
        : personID.startsWith('BMU')
        ? 'musician-active'
        : 'non-musician-active';

    const activeContainer = document.getElementById(activeId);

    [...activeContainer.children].forEach(child => {
        if (child.textContent.includes(personprocessed)) {
            child.remove();
        }
    });

    selectedNames.delete(personprocessed);

    recolorActivePersons();
    applyHighlightColorsToMarkers();

    filterAndSearchMarkers(); // Reapply filters after re-adding
}

function getActiveNamesFromContainer(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return [];
    
    return [...container.querySelectorAll('.selected-person-item')].map(item => {
        // Remove the "×" button text, leaving only the name
        return item.textContent.replace('×', '').trim();
    });
}

function recolorActivePersons() {
    const allSelected = Array.from(selectedNames);
    const colorMap = new Map();

    // Assign distinct colors
    allSelected.forEach((name, index) => {
        const color = getColorForIndex(index);
        colorMap.set(name, color);
    });

    // Apply to DOM pills
    const containers = [
        'composer-active',
        'musician-active',
        'non-musician-active'
    ];

    containers.forEach(cid => {
        const container = document.getElementById(cid);
        if (!container) return;

        [...container.querySelectorAll('.selected-person-item')].forEach(item => {
            const rawName = item.textContent.replace('×', '').trim();
            if (colorMap.has(rawName)) {
                const c = colorMap.get(rawName);

                // Higher contrast pill background
                item.style.backgroundColor = c + "33"; // ~20% opacity

                // Text color high contrast
                item.style.color = c;
                item.style.border = `2px solid ${c}`;
                item.style.borderRadius = "6px";
                item.style.fontWeight = "600";
            }
        });
    });
}

function applyHighlightColorsToMarkers() {
    const allSelected = Array.from(selectedNames);
    const colorMap = new Map();

    // Assign distinct highlight colors — same logic as pills
    allSelected.forEach((name, index) => {
        const color = getColorForIndex(index);
        colorMap.set(name, color);
    });

    // First reset ALL markers to their original default colors
    markers.forEach(entry => {
        const { marker, personID } = entry;

        // Determine default color by prefix
        let defaultColor;
        if (personID.startsWith("BCO")) {
            defaultColor = "#440154";   // composer purple
        } else if (personID.startsWith("BMU")) {
            defaultColor = "#23ed5c";   // musician green
        } else if (personID.startsWith("BNO")) {
            defaultColor = "#fde725";   // non-musician yellow
        } else {
            defaultColor = "#888888";   // fallback gray
        }

        marker.options.fillColor = defaultColor;
        marker.options.color = defaultColor;
        marker.setStyle({
            fillColor: defaultColor,
            color: defaultColor,
            fillOpacity: 0.8
        });
    });

    // Apply color to markers
    markers.forEach(entry => {
        const { marker, personprocessed } = entry;

        if (colorMap.has(personprocessed)) {
            const c = colorMap.get(personprocessed);

            // Update the underlying options
            marker.options.fillColor = c;
            marker.options.color = c;

            // Update marker appearance
            marker.setStyle({
                fillColor: c,
                color: c,
                fillOpacity: 0.9
            });
        }
    });

    if (markerCluster && typeof markerCluster.refreshClusters === "function") {
        markerCluster.refreshClusters();
    }
}

function getColorForIndex(index) {
    // If within fixed palette → return it
    if (index < highlightPalette.length) {
        return highlightPalette[index];
    }

    // Beyond palette → generate evenly spaced hues for uniqueness
    const extraIndex = index - highlightPalette.length;

    // Golden angle for nice spacing (~137.508°)
    const goldenAngle = 137.508;

    // Compute hue in degrees
    const hue = (extraIndex * goldenAngle) % 360;

    // Generate HSL color (converted to hex below)
    return hslToHex(hue, 70, 55); 
}

function hslToHex(h, s, l) {
    s /= 100; 
    l /= 100;

    const a = s * Math.min(l, 1 - l);
    const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, "0");
    };
    return `#${f(0)}${f(8)}${f(4)}`;
}

</script>
